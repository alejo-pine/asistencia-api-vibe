# fly.toml app configuration file generated for taller-vibe-api on 2026-04-23T03:50:48Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'taller-vibe-api'
primary_region = 'iad'

[build]

[env]
  DB_PATH = '/app/data/asistencia.db'
  PORT = '3000'

[[mounts]]
  source = 'taller_vibe_data'
  destination = '/app/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
